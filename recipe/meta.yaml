{% set name = "pyimagej" %}
{% set version = "1.8.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 177010bd708a0b20e4bc71847b161a131e514cd4de93d58e9881eb1e680b580d

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=77.0.0
  run:
    - python >={{ python_min }}
    - imglyb >=2.1.0
    - jgo >=2.1.0
    - jpype1 >=1.4.0
    - labeling >=0.1.14
    - matplotlib-base
    - numpy
    - scyjava >=1.12.4
    - xarray

test:
  requires:
    - python {{ python_min }}
  imports:
    - imagej

about:
  home: https://github.com/imagej/pyimagej
  license: Apache-2.0
  license_file: LICENSE.txt
  summary: The Python wrapper for ImageJ.
  doc_url: https://github.com/imagej/pyimagej
  dev_url: https://github.com/imagej/pyimagej

extra:
  recipe-maintainers:
    - ctrueden
    - elevans
    - hinerm
